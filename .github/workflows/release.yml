name: Release

# Binary releases: patch semver when Go sources or module deps change (see "meaningful code" step).

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test and smoke
        run: bin/build

  release:
    name: Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version and whether to release
        id: meta
        run: |
          set -euo pipefail
          LAST="$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)"
          if [ -n "$LAST" ]; then
            if ! git diff --name-only "${LAST}..HEAD" -- '*.go' 'go.mod' 'go.sum' | grep -q .; then
              echo "No meaningful code changes since ${LAST}; skipping release."
              echo "release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            ver="${LAST#v}"
            major="$(echo "$ver" | cut -d. -f1)"
            minor="$(echo "$ver" | cut -d. -f2)"
            patch="$(echo "$ver" | cut -d. -f3)"
            patch="$((patch + 1))"
            NEW="v${major}.${minor}.${patch}"
          else
            NEW="v0.1.0"
          fi
          echo "version=${NEW}" >> "$GITHUB_OUTPUT"
          echo "release=true" >> "$GITHUB_OUTPUT"
          echo "Next release: ${NEW}"

      - name: Set up Go
        if: steps.meta.outputs.release == 'true'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        if: steps.meta.outputs.release == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          MODULE=github.com/bandzoogle/cloudflare-cli/cmd
          LDFLAGS="-s -w -X ${MODULE}.Version=${VERSION}"
          mkdir -p dist
          build_one() {
            local goos="$1" goarch="$2"
            local dir="dist/build_${goos}_${goarch}"
            mkdir -p "$dir"
            GOOS="$goos" GOARCH="$goarch" go build -trimpath -ldflags "$LDFLAGS" -o "$dir/cfcli" .
            (cd "$dir" && tar -czf "../cfcli_${VERSION}_${goos}_${goarch}.tar.gz" cfcli)
            rm -rf "$dir"
            # Stable names for https://github.com/OWNER/REPO/releases/latest/download/...
            cp -f "dist/cfcli_${VERSION}_${goos}_${goarch}.tar.gz" "dist/cfcli_${goos}_${goarch}.tar.gz"
          }
          build_one linux amd64
          build_one linux arm64
          build_one darwin amd64
          build_one darwin arm64

      - name: Generate checksums
        if: steps.meta.outputs.release == 'true'
        run: |
          set -euo pipefail
          cd dist
          sha256sum cfcli_*.tar.gz > SHA256SUMS

      - name: Create GitHub release
        if: steps.meta.outputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          generate_release_notes: true
          files: |
            dist/cfcli_*.tar.gz
            dist/SHA256SUMS
