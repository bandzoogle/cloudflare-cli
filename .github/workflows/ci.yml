name: CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and smoke test
        run: bin/build
